<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simpson's Rule Calculator</title>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>

<h1>Simpson's Rule Calculator</h1>

<p>Enter the function f(x), lower limit (a), upper limit (b), number of intervals (n), and select the type of Simpson's Rule (1/3 or 3/8) to calculate the integral.</p>

<form id="simpsonForm">
  <label for="function">f(x) = </label>
  <input type="text" id="function" value="x**2"><br><br>
  
  <label for="lowerLimit">Lower Limit (a):</label>
  <input type="number" id="lowerLimit" value="0"><br><br>
  
  <label for="upperLimit">Upper Limit (b):</label>
  <input type="number" id="upperLimit" value="1"><br><br>
  
  <label for="intervals">Number of Intervals (n):</label>
  <input type="number" id="intervals" value="10"><br><br>
  
  <label for="simpsonType">Simpson's Rule Type:</label>
  <select id="simpsonType">
    <option value="1/3">1/3</option>
    <option value="3/8">3/8</option>
  </select><br><br>
  
  <button type="button" onclick="calculateSimpson()">Calculate</button>
</form>

<div id="graph"></div>

<div id="result"></div>

<div id="table"></div>

<div id="steps"></div>

<script>
function f(x) {
    return eval(document.getElementById('function').value);
}

function simpsonsRule(a, b, n, type) {
    var h = (b - a) / n;
    var sum = f(a) + f(b);
    var terms = [];
    var steps = [];
    
    if (type === "1/3") {
        for (var i = 1; i < n; i++) {
            var x = a + i * h;
            var term = i % 2 === 0 ? 2 * f(x) : 4 * f(x);
            sum += term;
            terms.push(term);
            steps.push({x: x, f_x: f(x), term: term});
        }
        sum *= (h / 3);
    } else if (type === "3/8") {
        var term1 = 0, term2 = 0;
        for (var i = 1; i < n; i++) {
            var x = a + i * h;
            if (i % 3 === 0) {
                term2 += 2 * f(x);
            } else {
                term1 += 3 * f(x);
            }
            sum += f(x);
            steps.push({x: x, f_x: f(x)});
        }
        sum = (3 * h / 8) * (f(a) + f(b) + 3 * term1 + 2 * term2);
    }
    
    return { result: sum, terms: terms, steps: steps };
}

function calculateSimpson() {
    var a = parseFloat(document.getElementById('lowerLimit').value);
    var b = parseFloat(document.getElementById('upperLimit').value);
    var n = parseInt(document.getElementById('intervals').value);
    var type = document.getElementById('simpsonType').value;
    
    var result = simpsonsRule(a, b, n, type);
    document.getElementById('result').innerHTML = "<h2>Result: " + result.result + "</h2>";
    
    var xValues = [], yValues = [];
    var h = (b - a) / n;
    
    for (var i = 0; i <= n; i++) {
        xValues.push(a + i * h);
        yValues.push(f(a + i * h));
    }
    
    var trace = {
        x: xValues,
        y: yValues,
        mode: 'lines',
        name: 'f(x)'
    };
    
    var layout = {
        title: "Function Plot",
        xaxis: {
            title: "x"
        },
        yaxis: {
            title: "f(x)"
        }
    };
    
    Plotly.newPlot('graph', [trace], layout);
    
    var tableHTML = "<h2>Simpson's Rule Terms</h2>";
    tableHTML += "<table border='1'><tr><th>x</th><th>f(x)</th><th>Term</th></tr>";
    for (var i = 0; i < n; i++) {
        tableHTML += "<tr><td>" + result.steps[i].x + "</td><td>" + result.steps[i].f_x + "</td><td>" + result.steps[i].term + "</td></tr>";
    }
    tableHTML += "</table>";
    
    document.getElementById('table').innerHTML = tableHTML;
    
    var stepsHTML = "<h2>Step-by-Step Solution</h2>";
    stepsHTML += "<ol>";
    for (var i = 0; i < result.steps.length; i++) {
        stepsHTML += "<li>For x = " + result.steps[i].x + ", f(x) = " + result.steps[i].f_x;
        if (result.terms && result.terms[i]) {
            stepsHTML += ", Term = " + result.terms[i];
        }
        stepsHTML += "</li>";
    }
    stepsHTML += "</ol>";
    
    document.getElementById('steps').innerHTML = stepsHTML;
}
</script>

</body>
</html>
